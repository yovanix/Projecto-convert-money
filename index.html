<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Devlub- convert Money</title>
</head>

<body>
    <img src="./assets/logo.gif" alt="Logo-Devlub-convert-money" class="logo-gif">
    <main>
        <label>
            converter <b>de</b>
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>
        <label>
            converter <b>para</b>
            <select class="currency-select">    
                <option value="Dolar">US$ Dólar Americano</option>
                <option value="Euro">€ Euro</option>
                <option value="Peso">ARS Peso Argentino</option>
                <option value="Bitcoin">₿ Bitcoin</option>
                <option value="Libra">£ Libra Esterlina</option>
            </select>
        </label>
        <label>
            <b>valor</b>

            <input class="currency-input" placeholder="R$ 10.000,00">

        </label>
        <button>Converter</button>
        <section>
            <div class="currency-box">
                <img class="Arrow-img" src="./assets/brasil 2.png" alt="Logo-moneda-a-comverter">
                <p class="currency">Real Brasileiro</p>
                <p  class="currency-value-to-convert">R$ 0.00,00</p>
            </div>
            <img src="./assets/Vector.png" alt="seta">
            <div class="currency-box">
                <img class="currency-image" src="./assets/Dolar.png" alt="Logo-moneda-a-converter">
                <p class="currency" id="currency-name">Dólar Americano</p>
                <p  class="currency-value">US$0.00,00</p>
            </div>
        </section>
    </main>

</body>
<script src="./java.js"></script>
</html>
